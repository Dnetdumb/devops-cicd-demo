apiVersion: v1
kind: PersistentVolume
metadata:
  name: pg-pv-pri
spec:
  capacity:
    storage: 1Gi
  volumeMode: Filesystem
  accessModes:
   - ReadWriteOnce
  storageClassName: manual
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: "/mnt/data/pg-pv-pri"
  claimRef:
    name: pg-cluster-1
    namespace: demo
---
