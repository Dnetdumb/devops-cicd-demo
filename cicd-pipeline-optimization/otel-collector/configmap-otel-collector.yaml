apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-conf
  namespace: monitoring
data:
  otel-collector-config.yaml: |
    receivers:
      otlp:
        protocols:
          http:
            endpoint: 0.0.0.0:4318
          grpc:
            endpoint: 0.0.0.0:4317

      filelog:
        include:
          - /var/log/pods/demo_frontend-*/*/*.log
          - /var/log/pods/demo_backend-*/*/*.log
        start_at: end    # chỉ đọc log mới từ thời điểm start collector
        include_file_path: true
        operators:
          - type: json_parser

    processors:
      batch: {}

      resourcedetection:
        detectors: [env, system]
      attributes/loki:
        actions:
          - action: insert
            key: loki.resource.labels
            value: "k8s.pod.name, k8s.namespace.name, k8s.container.name"

    exporters:

      debug:
        verbosity: detailed

      # TRACES -> TEMPO
      otlp/tempo:
        endpoint: tempo.monitoring.svc.cluster.local:4317
        tls:
          insecure: true

      # LOGS -> LOKI
      loki:
        endpoint: "http://loki-gateway.monitoring.svc.cluster.local/loki/api/v1/push"
        default_labels_enabled:
          exporter: true
          job: true
          instance: true

      # METRICS -> PROMETHEUS SCRAPE -> GRAFANA DAHSBOARD  
      prometheus:
        endpoint: "0.0.0.0:8889"

    service:
      pipelines:

        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [otlp/tempo]

        logs:
          receivers: [otlp, filelog]
          processors: [resourcedetection, batch]
          exporters: [debug, loki]

        metrics:
          receivers: [otlp]
          processors: [batch]
          exporters: [prometheus]
