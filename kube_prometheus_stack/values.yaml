grafana:
  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - grafana.lab.local
    path: /
    pathType: Prefix

prometheus:
  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - prometheus.lab.local
    paths:
      - /
    pathType: Prefix

alertmanager:
  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - alert.lab.local
    paths:
      - /
    pathType: Prefix
