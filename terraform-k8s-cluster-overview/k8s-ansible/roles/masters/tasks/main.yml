---
- name: Generate cluster k8s with kubeadm init
  command: kubeadm init --pod-network-cidr={{ pod_network_cidr }} --apiserver-advertise-address={{ ansible_host }}
  # Only execute command if args: file /etc/kubernetes/admin.conf not exist 
  args:
    creates: /etc/kubernetes/admin.conf

- name: Create to config kubectl for root
  file:
    path: /root/.kube
    state: directory

- name: Copy admin.conf
  copy:
    src: /etc/kubernetes/admin.conf
    dest: /root/.kube/config
    remote_src: yes

- name: Install Calico CNI
  command: kubectl apply -f "{{ CNI_URL }}"

- name: Get join command
  command: kubeadm token create --print-join-command
  register: join_cmd
  # Only run "--print-join-command" once and delegate to master-cp1 run it
  run_once: true
  delegate_to: "{{ groups['masters'][0] }}"

- name: Set join command as a fact
  set_fact:
    join_cmd: "{{ join_cmd.stdout }}"
  run_once: true


# References source:
# https://docs.ansible.com/projects/ansible/latest/collections/ansible/builtin/command_module.html
