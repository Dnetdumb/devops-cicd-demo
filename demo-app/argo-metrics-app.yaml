apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: metrics-app
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: metricsapp=peidhhn/metrics-app
    argocd-image-updater.argoproj.io/metricsapp.update.strategy: newest-build
    argocd-image-updater.argoproj.io/metricsapp.allow-tags: regexp:^v[0-9]+-[0-9]+-[a-f0-9]+$
    argocd-image-updater.argoproj.io/metricsapp.helm.image-name: image.repository
    argocd-image-updater.argoproj.io/metricsapp.helm.image-tag: image.tag
    argocd-image-updater.argoproj.io/metricsapp.write-back-method: git
    argocd-image-updater.argoproj.io/git-branch: main
spec:
  project: default
  source:
    repoURL: git@github.com:Dnetdumb/CD-Repo.git
    targetRevision: main
    path: appteam1/helm/metrics-app
    helm:
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: appteam1

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
